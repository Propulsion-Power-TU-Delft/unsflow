[CFD PROCESSING]

; Type of mesh (default, sigmoid, gauss-lobatto)
MESH_TYPE = sigmoid

; Mesh generation method (elliptic, TFI)
MESH_GENERATION_METHOD = TFI

; Grid Orthogonality during elliptic smoothing (True or False)
GRID_ORTHOGONALITY = True

; Type of domains represented by the blocks (unbladed, rotor, or stator)
BLOCKS_TYPE = unbladed, rotor, unbladed
BLOCKS_TOPOLOGY = inlet, internal, outlet
BLOCKS_TRIM_TYPE = axial, axial, axial

; Number of points in the streamwise direction (same length of blocks_type)
STREAMWISE_POINTS = 30, 40, 40

; Number of points in the spanwise direction (only one value)
SPANWISE_POINTS = 40

; Interpolation method used to compute the gradients on the working grid
GRADIENT_INTERPOLATION_METHOD = linear

; Reference quantities, in SI units
X_REF = 1

; Shaft rotating speed in rpm
SHAFT_RPM = 0, -17189, 0

; Dimensions of the coordinates in the geometry files
COORDINATES_FILE_UNITS = cm

; Coefficients for the sigmoid stretching of the grid
SIGMOID_STREAM_COEFFICIENTS = 2.5, 1.5, 2.5
SIGMOID_SPAN_COEFFICIENT = 1.25

; Filepath of the hub,shroud and blade geometry files
HUB_COORDINATES_FILEPATH = coordinates/hub_long_inlet.curve
SHROUD_COORDINATES_FILEPATH = coordinates/shroud_long_inlet.curve
BLADE_COORDINATES_FILEPATH = coordinates/profile.curve

; Type of the blade leading and trailing edge
BLADE_INLET_TYPE = axial
BLADE_OUTLET_TYPE = axial

; Specify how to reconstruct the blade camber on the meridional grid (regression, interpolation, rbf-interpolation, bivariate_spline). Don't use rbf-interpolation or bivariate_spline at the moment.
BLADES_CAMBER_RECONSTRUCTION = interpolation

; Verbosity
VERBOSITY = True

VISUAL_DEBUG = True

; Specify if you wish to normalize all the fields
NORMALIZE_DATA = True

; Specify if you wish to clip the BFM fields to be physically true (e.g. Loss Force always higher than zero)
CLIPPING_BFM = False

; Folder of the pictures for the output
PICTURES_FOLDER_PATH = Pictures

[BFM DATA]
BLADES_NUMBER = 36
ROTATION_FACTORS = 1
BFM_ROTATIONAL_SPEEDS = 0, -17189, 0