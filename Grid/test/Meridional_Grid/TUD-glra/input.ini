[CFD PROCESSING]

; Gamma of the fluid (e.g. 1.4)
GAMMA_FLUID = 1.4

; Type of mesh (default, sigmoid)
MESH_TYPE = default

; Mesh generation method (elliptic)
MESH_GENERATION_METHOD = TFI

; Coefficients for the sigmoid stretching of the grid
SIGMOID_STREAM_COEFFICIENTS = 1.5 1.5 1.5
SIGMOID_SPAN_COEFFICIENT = 1

; Grid Orthogonality during elliptic smoothing (True or False)
GRID_ORTHOGONALITY = True

; Regression of the fields and gradients with 4th order polynomial (True or False)
STANDARD_REGRESSION = False

; Type of domains representated by the blocks (unbladed, rotor, or stator)
BLOCKS_TYPE = unbladed rotor stator unbladed

; Number of points in the streamwise direction (same length of blocks_type)
STREAMWISE_POINTS = 60 20 30 
BLOCKS_TOPOLOGY = inlet internal outlet 

; Number of points in the spanwise direction (only one value)
SPANWISE_POINTS = 30

; Reference quantities, in SI units
X_REF = 1

; Shaft rotating speed in rpm
SHAFT_RPM = 0 20000 0 

; Dimensions of the coordinates in the geometry files
COORDINATES_FILE_UNITS = m

; Filepath of the hub,shroud and blade geometry files
HUB_COORDINATES_FILEPATH = Coords/Rotor16_hub.curve
SHROUD_COORDINATES_FILEPATH = Coords/Rotor16_shroud.curve
BLADE_COORDINATES_FILEPATH = Coords/Rotor16_profile.curve
INVERT_AXIAL_COORDINATES = yes

; Type of the blade leading and trailing edge
BLADE_INLET_TYPE = axial
BLADE_OUTLET_TYPE = axial


BLADES_CAMBER_RECONSTRUCTION = interpolation

; Verbosity
VERBOSITY = True

; Specify if you wish to normalize all the fields
NORMALIZE_DATA = True

; Specify if you wish to clip the BFM fields to be physically true (e.g. Loss Force always higher than zero)
CLIPPING_BFM = True

VISUAL_DEBUG = True

BLOCKS_TRIM_TYPE = axial axial axial


[BFM DATA]
BLADES_NUMBER = 16
ROTATION_FACTORS = 1